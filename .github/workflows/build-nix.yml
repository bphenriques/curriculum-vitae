name: Build (Nix)

# Parallel, Nix-based build that validates the flake in CI. It only uploads a CI
# artifact (no release/tag), so it runs safely alongside build.yml. Once trusted,
# move the release step here (nix build -> bruno-henriques-cv.pdf) and retire build.yml.
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Persist /nix/store in GitHub's own Actions cache -- no third-party service or
      # token (unlike Cachix / FlakeHub Cache). This caches the texlive downloads AND
      # the texlive.combine output, which is the slow part of a LaTeX build.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'shell.nix', 'nix/**') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G   # trim before saving to stay under the cache limit

      - name: Build CV
        run: nix build .#cv --print-build-logs

      - name: Stage artifact
        run: cp result/bruno-henriques-cv.pdf bruno-henriques-cv.pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bruno-henriques-cv
          path: bruno-henriques-cv.pdf
          if-no-files-found: error
